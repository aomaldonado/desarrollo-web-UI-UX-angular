<section class="bg-white text-gray-600 body-font">
  <div class="container mx-auto flex px-5 py-24 md:flex-row flex-col items-center">
    <div
      class="lg:flex-grow md:w-1/2 lg:pr-24 md:pr-16 flex flex-col md:items-start md:text-left mb-16 md:mb-0 items-center text-center"
    >
      <h1 class="title-font sm:text-5xl text-4xl mb-4 font-bold text-gray-900">{{titulo}}</h1>
      <p class="mb-8 leading-relaxed text-lg">{{contenido}}</p>
      <div class="flex justify-center">
        <button
          class="inline-flex text-white bg-indigo-500 border-0 py-3 px-8 focus:outline-none hover:bg-indigo-600 rounded text-lg font-semibold"
        >
          Comprar Ticket
        </button>
        <button [class]="colorBoton"
          class="ml-4 inline-flex text-gray-700 bg-gray-100 border-0 py-3 px-8 focus:outline-none hover:bg-gray-200 rounded text-lg font-semibold"
        >
          Agenda
        </button>
      </div>
    </div>
    <div class="lg:max-w-lg lg:w-full md:w-1/2 w-5/6">
      <img
        class="object-cover object-center rounded-2xl shadow-2xl"
        alt="hero"
        [src]="imagenUrl"
      />
    </div>
  </div>
</section>
